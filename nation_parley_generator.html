<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nation Parley — Generador de Picks</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,600;1,400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold: #D4920C;
    --gold-light: #F5C030;
    --gold-dark: #8B5E08;
    --black: #0a0c0f;
    --surface: #111318;
    --surface2: #1a1d24;
    --border: #2a2d36;
    --text: #e8e0d0;
    --text-dim: #666a7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 22px 40px 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 600;
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }
  .brand span { font-style: italic; font-weight: 400; }

  main {
    width: 100%;
    max-width: 1140px;
    padding: 36px 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    align-items: start;
  }

  @media (max-width: 768px) { main { grid-template-columns: 1fr; } }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 26px;
  }
  .panel-title {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 22px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .section-sep {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold-dark);
    margin: 20px 0 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(212,146,12,0.2);
  }

  .field { margin-bottom: 14px; }
  label {
    display: block;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  input, select, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    padding: 10px 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--gold); }
  select option { background: #1a1a1a; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn-generate {
    width: 100%;
    margin-top: 6px;
    padding: 14px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-dark));
    border: none;
    border-radius: 8px;
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-generate:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-generate:active { transform: translateY(0); }
  .btn-generate:disabled { opacity: 0.45; cursor: not-allowed; }

  .preview-panel { display: flex; flex-direction: column; gap: 14px; }

  .canvas-wrap {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .canvas-wrap canvas { width: 100%; height: 100%; object-fit: contain; display: block; }
  .canvas-placeholder {
    position: absolute;
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 2px;
  }
  .canvas-placeholder svg { margin-bottom: 10px; opacity: 0.25; }

  .btn-download {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--gold);
    border-radius: 8px;
    color: var(--gold);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }
  .btn-download:hover { background: var(--gold); color: #000; }

  .spinner {
    display: none;
    width: 34px; height: 34px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    position: absolute;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-align: center;
    min-height: 14px;
  }
  .status.ok { color: #4CAF50; }
  .status.err { color: #e05050; }

  .pick2-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    user-select: none;
  }
  .pick2-toggle input[type=checkbox] {
    width: 16px; height: 16px;
    accent-color: var(--gold);
    cursor: pointer;
  }
  .pick2-block { display: none; }
  .pick2-block.visible { display: block; }

  /* ── AUTOCOMPLETE ── */
  .ac-wrap { position: relative; }

  .ac-dropdown {
    position: absolute;
    top: calc(100% + 5px);
    left: 0; right: 0;
    background: #181b24;
    border: 1px solid var(--gold);
    border-radius: 8px;
    z-index: 9999;
    display: none;
    box-shadow: 0 12px 40px rgba(0,0,0,0.85);
    max-height: 280px;
    overflow-y: auto;
  }
  .ac-dropdown::-webkit-scrollbar { width: 4px; }
  .ac-dropdown::-webkit-scrollbar-track { background: #111; }
  .ac-dropdown::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 2px; }

  .ac-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.12s;
  }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover, .ac-item.active { background: rgba(212,146,12,0.18); }

  .ac-flag { font-size: 22px; line-height: 1; flex-shrink: 0; width: 30px; text-align: center; }
  .ac-info { display: flex; flex-direction: column; gap: 1px; flex: 1; min-width: 0; }
  .ac-name { font-size: 15px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ac-meta { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }
</style>
</head>
<body>

<header>
  <svg width="34" height="34" viewBox="0 0 80 80" fill="none">
    <defs>
      <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#C8860A"/>
        <stop offset="50%" stop-color="#F5C030"/>
        <stop offset="100%" stop-color="#8B5E08"/>
      </linearGradient>
    </defs>
    <circle cx="40" cy="40" r="28" stroke="url(#hg)" stroke-width="2" fill="none"/>
    <line x1="12" y1="40" x2="68" y2="40" stroke="url(#hg)" stroke-width="1.8"/>
    <line x1="40" y1="12" x2="40" y2="68" stroke="url(#hg)" stroke-width="1.8"/>
    <ellipse cx="40" cy="40" rx="16" ry="28" stroke="url(#hg)" stroke-width="1.5" fill="none"/>
  </svg>
  <div class="brand">Nation <span>Parley</span></div>
</header>

<main>
  <!-- FORM -->
  <div class="panel">
    <div class="panel-title">Configurar imagen</div>

    <div class="section-sep">Partido</div>

    <div class="row2">
      <div class="field">
        <label>Liga / Torneo</label>
        <input id="league" type="text" placeholder="Se llena automático"/>
      </div>
      <div class="field">
        <label>Bandera</label>
        <input id="flag" type="text" placeholder="Se llena automático" maxlength="8"/>
      </div>
    </div>

    <div class="row2">
      <div class="field">
        <label>Fecha</label>
        <input id="matchDate" type="text" placeholder="Ej. 19 ABR"/>
      </div>
      <div class="field">
        <label>Hora</label>
        <input id="matchTime" type="text" placeholder="Ej. 12:30 COT"/>
      </div>
    </div>

    <div class="row2">
      <div class="field">
        <label>Equipo Local</label>
        <div class="ac-wrap">
          <input id="team1" type="text" placeholder="Escribe para buscar…" autocomplete="off"
            oninput="acSearch(this,'ac1','team1')"
            onkeydown="acKey(event,'ac1','team1')"
            onfocus="acSearch(this,'ac1','team1')"/>
          <div id="ac1" class="ac-dropdown"></div>
        </div>
      </div>
      <div class="field">
        <label>Equipo Visitante</label>
        <div class="ac-wrap">
          <input id="team2" type="text" placeholder="Escribe para buscar…" autocomplete="off"
            oninput="acSearch(this,'ac2','team2')"
            onkeydown="acKey(event,'ac2','team2')"
            onfocus="acSearch(this,'ac2','team2')"/>
          <div id="ac2" class="ac-dropdown"></div>
        </div>
      </div>
    </div>

    <!-- Pick 1 -->
    <div class="section-sep">Pick #1</div>

    <div class="field">
      <label>Tipo de apuesta</label>
      <select id="betType1" onchange="syncBetLabel('betType1','betLabel1')">
        <option value="AMBOS MARCAN">Ambos marcan</option>
        <option value="MÁS DE 2.5 GOLES">Más de 2.5 goles</option>
        <option value="MÁS DE 3.5 GOLES">Más de 3.5 goles</option>
        <option value="MENOS DE 2.5 GOLES">Menos de 2.5 goles</option>
        <option value="VICTORIA LOCAL">Victoria local</option>
        <option value="VICTORIA VISITANTE">Victoria visitante</option>
        <option value="EMPATE">Empate</option>
        <option value="HÁNDICAP">Hándicap</option>
        <option value="DOBLE OPORTUNIDAD">Doble oportunidad</option>
        <option value="PRIMER GOL">Primer gol</option>
        <option value="PERSONALIZADO">Personalizado</option>
      </select>
    </div>
    <div id="customBet1Block" class="field" style="display:none">
      <label>Texto personalizado (Pick #1)</label>
      <input id="customBet1" type="text" placeholder="Ej. MÁS DE 1.5 GOLES"/>
    </div>
    <div class="field">
      <label>Subtítulo en inglés (Pick #1)</label>
      <input id="betLabel1" type="text" placeholder="Ej. BOTH TEAMS TO SCORE"/>
    </div>
    <div class="row2">
      <div class="field">
        <label>Cuota</label>
        <input id="odds1" type="text" placeholder="Ej. 1.70"/>
      </div>
      <div class="field">
        <label>Stake</label>
        <input id="stake1" type="text" placeholder="Ej. 1.6"/>
      </div>
    </div>

    <!-- Pick 2 -->
    <div class="section-sep">
      <label class="pick2-toggle">
        <input type="checkbox" id="enablePick2" onchange="togglePick2()"/>
        Agregar Pick #2
      </label>
    </div>

    <div id="pick2Block" class="pick2-block">
      <div class="field">
        <label>Tipo de apuesta</label>
        <select id="betType2" onchange="syncBetLabel('betType2','betLabel2')">
          <option value="MÁS DE 2.5 GOLES">Más de 2.5 goles</option>
          <option value="AMBOS MARCAN">Ambos marcan</option>
          <option value="MÁS DE 3.5 GOLES">Más de 3.5 goles</option>
          <option value="MENOS DE 2.5 GOLES">Menos de 2.5 goles</option>
          <option value="VICTORIA LOCAL">Victoria local</option>
          <option value="VICTORIA VISITANTE">Victoria visitante</option>
          <option value="EMPATE">Empate</option>
          <option value="HÁNDICAP">Hándicap</option>
          <option value="DOBLE OPORTUNIDAD">Doble oportunidad</option>
          <option value="PRIMER GOL">Primer gol</option>
          <option value="PERSONALIZADO">Personalizado</option>
        </select>
      </div>
      <div id="customBet2Block" class="field" style="display:none">
        <label>Texto personalizado (Pick #2)</label>
        <input id="customBet2" type="text" placeholder="Ej. SOBRE 1.5 GOLES"/>
      </div>
      <div class="field">
        <label>Subtítulo en inglés (Pick #2)</label>
        <input id="betLabel2" type="text" placeholder="Ej. OVER 2.5 GOALS"/>
      </div>
      <div class="row2">
        <div class="field">
          <label>Cuota</label>
          <input id="odds2" type="text" placeholder="Ej. 1.80"/>
        </div>
        <div class="field">
          <label>Stake</label>
          <input id="stake2" type="text" placeholder="Ej. 1.3"/>
        </div>
      </div>
    </div>

    <button class="btn-generate" id="btnGenerate" onclick="generateImage()">
      ✦ Generar imagen
    </button>
    <div class="status" id="status" style="margin-top:10px"></div>
  </div>

  <!-- PREVIEW -->
  <div class="preview-panel">
    <div class="canvas-wrap">
      <div class="canvas-placeholder" id="placeholder">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="4" y="4" width="40" height="40" rx="4" stroke="#555" stroke-width="1.5" fill="none"/>
          <line x1="4" y1="18" x2="44" y2="18" stroke="#555" stroke-width="1"/>
          <rect x="8" y="24" width="14" height="12" rx="2" stroke="#555" stroke-width="1.2" fill="none"/>
          <rect x="26" y="24" width="14" height="12" rx="2" stroke="#555" stroke-width="1.2" fill="none"/>
        </svg>
        <div style="margin-top:10px">La imagen aparecerá aquí</div>
      </div>
      <div class="spinner" id="spinner"></div>
      <canvas id="pickCanvas" style="display:none"></canvas>
    </div>
    <button class="btn-download" id="btnDownload" onclick="downloadImage()">
      ↓ Descargar imagen PNG
    </button>
  </div>
</main>

const acState = {
  ac1: { idx: -1, results: [] },
  ac2: { idx: -1, results: [] },
};

function normalize(s) {
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ']/g,'');
}

function acSearch(input, dropId, inputId) {
  const q = normalize(input.value);
  const drop = document.getElementById(dropId);
  acState[dropId].idx = -1;

  if (!q || q.length < 1) { drop.style.display = 'none'; return; }

  // Deduplicate by display name
  const seen = new Set();
  const matches = TEAMS.filter(t => {
    const match = normalize(t.n).includes(q) || normalize(t.d).includes(q) || normalize(t.l).includes(q);
    if (match && !seen.has(t.d)) { seen.add(t.d); return true; }
    return false;
  }).slice(0, 9);

  acState[dropId].results = matches;
  if (!matches.length) { drop.style.display = 'none'; return; }

  drop.innerHTML = matches.map((t, i) => `
    <div class="ac-item" data-i="${i}"
      onmousedown="acSelect('${dropId}','${inputId}',${i})">
      <span class="ac-flag">${t.f}</span>
      <div class="ac-info">
        <span class="ac-name">${t.d}</span>
        <span class="ac-meta">${t.l}</span>
      </div>
    </div>`).join('');
  drop.style.display = 'block';
}

function acSelect(dropId, inputId, idx) {
  const team = acState[dropId].results[idx];
  if (!team) return;
  document.getElementById(inputId).value = team.d;
  document.getElementById(dropId).style.display = 'none';
  autoFillMeta(team);
}

let leagueManual = false, flagManual = false;
document.getElementById('league').addEventListener('input', function() { leagueManual = !!this.value; });
document.getElementById('flag').addEventListener('input', function()   { flagManual   = !!this.value; });

function autoFillMeta(team) {
  if (!leagueManual) document.getElementById('league').value = team.l;
  if (!flagManual)   document.getElementById('flag').value   = team.f;
}

function acKey(e, dropId, inputId) {
  const drop = document.getElementById(dropId);
  const items = drop.querySelectorAll('.ac-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acState[dropId].idx = Math.min(acState[dropId].idx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === acState[dropId].idx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acState[dropId].idx = Math.max(acState[dropId].idx - 1, 0);
    items.forEach((el, i) => el.classList.toggle('active', i === acState[dropId].idx));
  } else if (e.key === 'Enter' || e.key === 'Tab') {
    if (acState[dropId].idx >= 0) { e.preventDefault(); acSelect(dropId, inputId, acState[dropId].idx); }
  } else if (e.key === 'Escape') {
    drop.style.display = 'none';
  }
}

document.addEventListener('click', e => {
  if (!e.target.closest('.ac-wrap'))
    document.querySelectorAll('.ac-dropdown').forEach(d => d.style.display = 'none');
});

// CANVAS HELPERS
// ══════════════════════════════════════════
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function wrapCentered(ctx, text, cx, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '', lines = [];
  for (const w of words) {
    const test = line + w + ' ';
    if (ctx.measureText(test).width > maxW && line) { lines.push(line.trim()); line = w + ' '; }
    else line = test;
  }
  if (line) lines.push(line.trim());
  lines.forEach((l, i) => ctx.fillText(l, cx, y + i * lineH));
  return lines.length;
}

function drawGrid(ctx, size) {
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.045)'; ctx.lineWidth = 1;
  for (let v = size/6; v < size; v += size/6) {
    ctx.beginPath(); ctx.moveTo(v,0); ctx.lineTo(v,size); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,v); ctx.lineTo(size,v); ctx.stroke();
  }
  ctx.restore();
}

async function generateImage() {
  const btn = document.getElementById('btnGenerate');
  const spinner = document.getElementById('spinner');
  const statusEl = document.getElementById('status');
  const canvas = document.getElementById('pickCanvas');

  const league    = document.getElementById('league').value.trim();
  const flag      = document.getElementById('flag').value.trim();
  const matchDate = document.getElementById('matchDate').value.trim();
  const matchTime = document.getElementById('matchTime').value.trim();
  const team1     = document.getElementById('team1').value.trim() || 'EQUIPO A';
  const team2     = document.getElementById('team2').value.trim() || 'EQUIPO B';

  let bet1 = document.getElementById('betType1').value;
  if (bet1 === 'PERSONALIZADO') bet1 = (document.getElementById('customBet1').value.trim() || 'PICK 1').toUpperCase();
  const label1 = document.getElementById('betLabel1').value.trim().toUpperCase();
  const odds1  = document.getElementById('odds1').value.trim() || '—';
  const stake1 = document.getElementById('stake1').value.trim() || '—';

  const hasPick2 = document.getElementById('enablePick2').checked;
  let bet2='', label2='', odds2='', stake2='';
  if (hasPick2) {
    bet2  = document.getElementById('betType2').value;
    if (bet2==='PERSONALIZADO') bet2 = (document.getElementById('customBet2').value.trim()||'PICK 2').toUpperCase();
    label2 = document.getElementById('betLabel2').value.trim().toUpperCase();
    odds2  = document.getElementById('odds2').value.trim() || '—';
    stake2 = document.getElementById('stake2').value.trim() || '—';
  }

  btn.disabled = true;
  spinner.style.display = 'block';
  document.getElementById('placeholder').style.display = 'none';
  canvas.style.display = 'none';
  statusEl.textContent = 'Renderizando…'; statusEl.className = 'status';
  await new Promise(r => setTimeout(r, 30));

  const S = 1080;
  canvas.width = S; canvas.height = S;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#0d1017'; ctx.fillRect(0,0,S,S);
  drawGrid(ctx, S);
  const vig = ctx.createRadialGradient(S/2,S/2,S*0.25,S/2,S/2,S*0.75);
  vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle = vig; ctx.fillRect(0,0,S,S);

  const mkG = (x1,y1,x2,y2) => {
    const g = ctx.createLinearGradient(x1,y1,x2,y2);
    g.addColorStop(0,'#8B5E08'); g.addColorStop(0.35,'#F5C030');
    g.addColorStop(0.65,'#D4920C'); g.addColorStop(1,'#8B5E08');
    return g;
  };

  // Gold bars
  ctx.fillStyle = mkG(0,0,S,0); ctx.fillRect(0,0,S,10);

  // Meta line
  const parts = [];
  if (flag) parts.push(flag);
  if (league) parts.push(league.toUpperCase());
  if (matchDate) parts.push(matchDate.toUpperCase());
  if (matchTime) parts.push(matchTime.toUpperCase());
  ctx.font = '600 26px "Barlow Condensed",sans-serif';
  ctx.fillStyle = 'rgba(200,180,130,0.65)';
  ctx.textAlign = 'center'; ctx.letterSpacing = '3px';
  ctx.fillText(parts.join('  •  '), S/2, 72);

  // Teams
  const tY = 185;
  function fitFont(name, max, maxW) {
    let sz = max;
    ctx.font = `900 ${sz}px "Barlow Condensed",sans-serif`;
    while (ctx.measureText(name).width > maxW && sz > 46) { sz -= 4; ctx.font = `900 ${sz}px "Barlow Condensed",sans-serif`; }
    return sz;
  }
  const hw = S/2 - 82;
  const sz1 = fitFont(team1.toUpperCase(), 96, hw);
  const sz2 = fitFont(team2.toUpperCase(), 96, hw);

  ctx.font = `900 ${sz1}px "Barlow Condensed",sans-serif`;
  ctx.fillStyle = '#FFFFFF'; ctx.textAlign = 'right'; ctx.letterSpacing = '-1px';
  ctx.fillText(team1.toUpperCase(), S/2 - 54, tY);

  // VS box
  const vw=86,vh=46;
  ctx.fillStyle = 'rgba(212,146,12,0.18)';
  roundRect(ctx, S/2-vw/2, tY-vh+6, vw, vh, 6); ctx.fill();
  ctx.strokeStyle = mkG(S/2-vw/2,0,S/2+vw/2,0); ctx.lineWidth = 1.2;
  roundRect(ctx, S/2-vw/2, tY-vh+6, vw, vh, 6); ctx.stroke();
  ctx.font = '700 28px "Barlow Condensed",sans-serif';
  ctx.fillStyle = 'rgba(245,192,48,0.9)'; ctx.textAlign = 'center'; ctx.letterSpacing = '1px';
  ctx.fillText('VS', S/2, tY - 4);

  ctx.font = `900 ${sz2}px "Barlow Condensed",sans-serif`;
  ctx.fillStyle = '#9aa0b0'; ctx.textAlign = 'left'; ctx.letterSpacing = '-1px';
  ctx.fillText(team2.toUpperCase(), S/2 + 54, tY);

  // Cards
  const cTop = tY + 68, cH = 360, pad = 60, gp = 22;
  if (hasPick2) {
    const cW = (S - pad*2 - gp) / 2;
    drawCard(ctx, pad, cTop, cW, cH, 'PICK #1', bet1, label1, odds1, stake1, mkG);
    drawCard(ctx, pad+cW+gp, cTop, cW, cH, 'PICK #2', bet2, label2, odds2, stake2, mkG);
  } else {
    drawCard(ctx, pad, cTop, S-pad*2, cH, 'PICK #1', bet1, label1, odds1, stake1, mkG);
  }

  // Disclaimer
  ctx.font = '400 19px "Barlow Condensed",sans-serif';
  ctx.fillStyle = 'rgba(160,150,130,0.38)';
  ctx.textAlign = 'center'; ctx.letterSpacing = '1px';
  ctx.fillText('Análisis estadístico informativo  •  Solo para mayores de 18 años  •  Juega con responsabilidad', S/2, cTop+cH+56);

  // Bottom bar
  ctx.fillStyle = mkG(0,0,S,0); ctx.fillRect(0,S-10,S,10);

  spinner.style.display = 'none';
  canvas.style.display = 'block';
  document.getElementById('btnDownload').style.display = 'block';
  btn.disabled = false;
  statusEl.textContent = '✦ Imagen lista'; statusEl.className = 'status ok';
}

function drawCard(ctx, x, y, w, h, num, bet, lbl, odds, stake, mkG) {
  ctx.fillStyle = 'rgba(20,22,30,0.93)'; roundRect(ctx,x,y,w,h,14); ctx.fill();
  ctx.strokeStyle = mkG(x,y,x+w,y); ctx.lineWidth = 1.8; roundRect(ctx,x,y,w,h,14); ctx.stroke();
  ctx.strokeStyle = 'rgba(245,192,48,0.1)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x+18,y+1.5); ctx.lineTo(x+w-18,y+1.5); ctx.stroke();

  const cx = x + w/2;

  // Pick number
  ctx.font = '600 20px "Barlow Condensed",sans-serif';
  ctx.fillStyle = 'rgba(212,146,12,0.7)'; ctx.textAlign = 'center'; ctx.letterSpacing = '4px';
  ctx.fillText(num, cx, y+46);

  // Bet text
  ctx.fillStyle = '#F5C030'; ctx.textAlign = 'center'; ctx.letterSpacing = '-0.5px';
  let bsz = 90;
  ctx.font = `900 ${bsz}px "Barlow Condensed",sans-serif`;
  for (const word of bet.split(' ')) {
    while (ctx.measureText(word).width > w-44 && bsz > 44) {
      bsz -= 4; ctx.font = `900 ${bsz}px "Barlow Condensed",sans-serif`;
    }
  }
  const bLH = bsz * 1.06;
  const bLines = wrapCentered(ctx, bet, cx, y+78+bsz, w-44, bLH);
  const bBot = y + 78 + bsz + (bLines-1) * bLH;

  // English label
  if (lbl) {
    ctx.font = '600 21px "Barlow Condensed",sans-serif';
    ctx.fillStyle = 'rgba(200,190,160,0.5)'; ctx.textAlign = 'center'; ctx.letterSpacing = '2px';
    ctx.fillText(lbl, cx, bBot + 34);
  }

  // Badges
  const bY = y + h - 100, bH = 66, bGap = 12, bW = (w-50)/2;
  const b1 = x+24, b2 = x+24+bW+bGap;

  // Cuota
  ctx.fillStyle = 'rgba(28,31,40,0.95)'; roundRect(ctx,b1,bY,bW,bH,8); ctx.fill();
  ctx.strokeStyle = 'rgba(212,146,12,0.28)'; ctx.lineWidth = 1; roundRect(ctx,b1,bY,bW,bH,8); ctx.stroke();
  ctx.font = '600 15px "Barlow Condensed",sans-serif'; ctx.fillStyle = 'rgba(175,155,95,0.65)';
  ctx.textAlign = 'center'; ctx.letterSpacing = '2px'; ctx.fillText('CUOTA', b1+bW/2, bY+23);
  ctx.font = '800 34px "Barlow Condensed",sans-serif'; ctx.fillStyle = '#FFFFFF'; ctx.letterSpacing = '0px';
  ctx.fillText(odds, b1+bW/2, bY+56);

  // Stake
  ctx.fillStyle = 'rgba(212,146,12,0.14)'; roundRect(ctx,b2,bY,bW,bH,8); ctx.fill();
  ctx.strokeStyle = 'rgba(212,146,12,0.42)'; ctx.lineWidth = 1; roundRect(ctx,b2,bY,bW,bH,8); ctx.stroke();
  ctx.font = '600 15px "Barlow Condensed",sans-serif'; ctx.fillStyle = 'rgba(245,192,48,0.72)';
  ctx.textAlign = 'center'; ctx.letterSpacing = '2px'; ctx.fillText('STAKE', b2+bW/2, bY+23);
  ctx.font = '800 34px "Barlow Condensed",sans-serif'; ctx.fillStyle = '#F5C030'; ctx.letterSpacing = '0px';
  ctx.fillText(stake, b2+bW/2, bY+56);
}

function downloadImage() {
  const canvas = document.getElementById('pickCanvas');
  const a = document.createElement('a');
  a.download = `NationParley_${document.getElementById('team1').value||'pick'}.png`.replace(/\s+/g,'_');
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>
